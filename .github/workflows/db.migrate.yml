name: DB Migrate (Manual)

on:
  workflow_dispatch:

concurrency:
  group: db-migrate-manual
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Yandex Cloud Container Registry
        uses: yc-actions/yc-cr-login@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build migration image
        env:
          CR_REGISTRY: crpl5fte5jrniapk2mka
          CR_REPOSITORY: db-migrate
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f packages/db/Dockerfile.migrate \
            -t cr.yandex/$CR_REGISTRY/$CR_REPOSITORY:$IMAGE_TAG \
            -t cr.yandex/$CR_REGISTRY/$CR_REPOSITORY:latest .
          docker push cr.yandex/$CR_REGISTRY/$CR_REPOSITORY:$IMAGE_TAG
          docker push cr.yandex/$CR_REGISTRY/$CR_REPOSITORY:latest

      - name: Run migration job in k3s
        uses: kodermax/kubectl-aws-eks@main
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
          CR_REGISTRY: crpl5fte5jrniapk2mka
          CR_REPOSITORY: db-migrate
          IMAGE_TAG: ${{ github.sha }}
        with:
          args: |
            apply -f - <<EOF
            apiVersion: batch/v1
            kind: Job
            metadata:
              name: db-migrate-${{ github.sha }}
              namespace: qbs
            spec:
              ttlSecondsAfterFinished: 300
              backoffLimit: 2
              template:
                spec:
                  restartPolicy: Never
                  containers:
                  - name: migrate
                    image: cr.yandex/$CR_REGISTRY/$CR_REPOSITORY:$IMAGE_TAG
                    env:
                    - name: POSTGRES_URL
                      valueFrom:
                        secretKeyRef:
                          name: db-credentials
                          key: postgres-url
                    resources:
                      requests:
                        memory: "256Mi"
                        cpu: "100m"
                      limits:
                        memory: "512Mi"
                        cpu: "500m"
            EOF

      - name: Wait for migration to complete
        uses: kodermax/kubectl-aws-eks@main
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        with:
          args: wait --for=condition=complete --timeout=300s job/db-migrate-${{ github.sha }} -n qbs

      - name: Get migration logs
        if: always()
        uses: kodermax/kubectl-aws-eks@main
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        with:
          args: logs job/db-migrate-${{ github.sha }} -n qbs

      - name: Cleanup job
        if: always()
        uses: kodermax/kubectl-aws-eks@main
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        with:
          args: delete job db-migrate-${{ github.sha }} -n qbs --ignore-not-found=true
