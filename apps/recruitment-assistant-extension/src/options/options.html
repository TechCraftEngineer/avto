<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Настройки — Recruitment Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f9fafb;
      color: #111827;
      line-height: 1.5;
    }
    
    /* Скрытие элементов для screen readers */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
    
    /* Видимые фокус-кольца */
    *:focus-visible {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }
    
    input:focus-visible,
    button:focus-visible {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }
    
    /* Стили для чекбоксов */
    input[type="checkbox"]:focus-visible {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }
    
    /* Убираем стандартный outline и добавляем свой */
    button:focus {
      outline: none;
    }
    
    button:focus-visible {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./options.tsx"></script>
</body>
</html>
